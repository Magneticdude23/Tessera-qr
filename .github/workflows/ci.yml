name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run tests
        run: pytest -q
      - name: Compile backend & app
        run: |
          python -m py_compile backend/main.py backend/serialize.py app.py
      - name: Backend smoke test
        run: |
          python -c "from fastapi.testclient import TestClient; from backend.main import app; c=TestClient(app); assert c.post('/api/surface', json={'source':'synthetic'}).status_code==200; print('backend ok')"
